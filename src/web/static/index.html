<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小智音箱 · 控制面板</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.x/dist/cdn.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
          --green:#22c55e; --blue:#3b82f6; --red:#ef4444; --yellow:#eab308;
          --purple:#a855f7; --border:#334155; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:1200px; margin:0 auto; padding:16px; }

  /* Header */
  .header { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); margin-bottom:16px; }
  .header h1 { font-size:1.2rem; font-weight:600; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .dot.idle{background:var(--green)} .dot.listening{background:var(--blue);animation:pulse .8s infinite}
  .dot.thinking{background:var(--purple);animation:pulse .5s infinite} .dot.speaking{background:var(--yellow)}
  .dot.error{background:var(--red)} .dot.muted{background:var(--muted)}
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .tag { font-size:.75rem; padding:2px 8px; border-radius:12px; background:var(--border); }

  /* Grid */
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }
  .card { background:var(--card); border-radius:10px; padding:14px; border:1px solid var(--border); }
  .card h2 { font-size:.85rem; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }

  /* Status */
  .stat-row { display:flex; justify-content:space-between; padding:4px 0; font-size:.82rem; }
  .stat-row span:last-child { color:var(--muted); }

  /* Audio meter */
  .meter { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:8px 0; }
  .meter-bar { height:100%; background:linear-gradient(90deg,var(--green),var(--yellow),var(--red)); border-radius:3px; transition:width .1s; }

  /* Messages */
  .msg { padding:8px 10px; margin:6px 0; border-radius:8px; font-size:.82rem; line-height:1.4; }
  .msg.user { background:#1e3a5f; margin-left:24px; }
  .msg.assistant { background:#1a2e1a; margin-right:24px; }
  .msg .role { font-size:.7rem; color:var(--muted); margin-bottom:2px; }

  /* Events timeline */
  .event { font-size:.75rem; padding:3px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; }
  .event .ts { color:var(--muted); white-space:nowrap; min-width:70px; }
  .event .type { color:var(--blue); min-width:100px; font-weight:500; }
  .event .detail { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:12px; }
  .tab { padding:6px 14px; border-radius:6px; font-size:.8rem; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); }
  .tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }

  /* Input */
  .input-row { display:flex; gap:8px; margin-top:8px; }
  .input-row input { flex:1; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:.85rem; }
  .input-row button { padding:8px 16px; border-radius:8px; border:none; background:var(--blue); color:#fff; cursor:pointer; font-size:.85rem; font-weight:500; }
  .input-row button:hover { opacity:.85; }

  /* Config editor */
  .config-area { width:100%; min-height:200px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; font-family:monospace; font-size:.78rem; resize:vertical; }

  /* Buttons */
  .btn-sm { padding:4px 12px; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:.75rem; }
  .btn-sm:hover { background:var(--border); }
  .btn-sm.danger { border-color:var(--red); color:var(--red); }

  /* Scrollable */
  .scroll { max-height:300px; overflow-y:auto; }
  .scroll::-webkit-scrollbar { width:4px; }
  .scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* Config form */
  .config-field { padding:10px 0; border-bottom:1px solid var(--border); }
  .config-field.error { border-left:3px solid var(--red); padding-left:8px; }
  .config-label { display:flex; align-items:center; gap:8px; font-size:.82rem; font-weight:500; margin-bottom:2px; }
  .config-desc { display:block; font-size:.7rem; color:var(--muted); margin-bottom:6px; }
  .config-input, .config-select { width:100%; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:.8rem; }
  .config-select { cursor:pointer; }
  .restart-badge { font-size:.65rem; padding:1px 6px; border-radius:8px; background:var(--yellow); color:#000; }
  .no-restart-badge { font-size:.65rem; padding:1px 6px; border-radius:8px; background:var(--green); color:#fff; }
  .number-row { display:flex; align-items:center; gap:12px; }
  .number-row input[type=range] { flex:1; accent-color:var(--blue); }
  .number-value { min-width:40px; text-align:right; font-family:monospace; font-size:.8rem; color:var(--muted); }
  .field-error { display:block; font-size:.7rem; color:var(--red); margin-top:4px; }
  .toggle { position:relative; display:inline-block; width:40px; height:22px; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; cursor:pointer; inset:0; background:var(--border); border-radius:22px; transition:.2s; }
  .toggle-slider:before { content:""; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; }
  .toggle input:checked + .toggle-slider { background:var(--blue); }
  .toggle input:checked + .toggle-slider:before { transform:translateX(18px); }
  .config-msg-success { color:var(--green); }
  .config-msg-error { color:var(--red); }
</style>
</head>
<body>
<div class="app" x-data="dashboard">

  <!-- Header -->
  <div class="header">
    <span class="dot" :class="state.state||'idle'"></span>
    <h1>小智音箱</h1>
    <span class="tag" x-text="state.state||'idle'"></span>
    <span style="flex:1"></span>
    <button class="btn-sm" @click="doWake">唤醒</button>
    <button class="btn-sm danger" @click="closeWeb">关闭 Web</button>
  </div>

  <!-- Grid -->
  <div class="grid">

    <!-- 状态 -->
    <div class="card">
      <h2>系统状态</h2>
      <div class="stat-row"><span>引擎状态</span><span x-text="state.engine_state||'?'"></span></div>
      <div class="stat-row"><span>交互次数</span><span x-text="state.total_interactions||0"></span></div>
      <div class="stat-row"><span>错误次数</span><span x-text="state.error_count||0"></span></div>
      <div class="stat-row"><span>最后唤醒置信度</span><span x-text="(state.last_wake_confidence||0).toFixed(3)"></span></div>
      <div class="stat-row"><span>最后 ASR</span><span x-text="(state.last_asr_text||'-').slice(0,20)"></span></div>
    </div>

    <!-- 音频 -->
    <div class="card">
      <h2>音频电平</h2>
      <div class="meter"><div class="meter-bar" :style="{width:(audioPct*100)+'%'}"></div></div>
      <div class="stat-row"><span>RMS</span><span x-text="state.audio_rms?.toFixed(4)||'0'"></span></div>
      <div class="stat-row"><span>采集状态</span><span x-text="sys.capture_running ? '✓' : '✗'"></span></div>
      <div class="stat-row"><span>播放状态</span><span x-text="sys.player_playing ? '播放中' : '空闲'"></span></div>
    </div>

    <!-- 系统资源 -->
    <div class="card">
      <h2>系统资源</h2>
      <div class="stat-row"><span>CPU</span><span x-text="(system.cpu_percent||0).toFixed(1)+'%'"></span></div>
      <div class="meter"><div class="meter-bar" :style="{width:system.cpu_percent+'%'}"></div></div>
      <div class="stat-row"><span>内存</span><span x-text="(system.memory_used_mb||0)+' / '+(system.memory_total_mb||0)+' MB'"></span></div>
      <div class="meter"><div class="meter-bar" :style="{width:system.memory_percent+'%'}"></div></div>
      <div class="stat-row"><span>磁盘可用</span><span x-text="(system.disk_free_gb||0).toFixed(1)+' GB'"></span></div>
    </div>

  </div>

  <!-- Tabs -->
  <div class="tabs" style="margin-top:16px">
    <button class="tab" :class="{active:tab==='chat'}" @click="tab='chat'">对话</button>
    <button class="tab" :class="{active:tab==='events'}" @click="tab='events'">事件流</button>
    <button class="tab" :class="{active:tab==='config'}" @click="tab='config'">
      配置<span x-show="Object.keys(formDirty).length>0" style="color:var(--yellow);margin-left:2px;">*</span>
    </button>
  </div>

  <!-- 对话 -->
  <div class="card" x-show="tab==='chat'">
    <h2>对话记录</h2>
    <div class="scroll" x-ref="chatScroll">
      <template x-for="m in messages">
        <div class="msg" :class="m.role">
          <div class="role" x-text="m.role==='user'?'用户':'小智'"></div>
          <div x-text="m.content"></div>
        </div>
      </template>
      <div x-show="messages.length===0" style="color:var(--muted);font-size:.8rem;">暂无对话</div>
    </div>
    <div class="input-row">
      <input placeholder="输入文字指令..." @keydown.enter="sendText($el)" x-ref="textInput">
      <button @click="sendText($refs.textInput)">发送</button>
    </div>
  </div>

  <!-- 事件流 -->
  <div class="card" x-show="tab==='events'">
    <h2>事件流（最近 100 条）</h2>
    <div class="scroll">
      <template x-for="e in events">
        <div class="event">
          <span class="ts" x-text="fmtTime(e.ts)"></span>
          <span class="type" x-text="e.event"></span>
          <span class="detail" x-text="eventDetail(e)"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- 配置 -->
  <div class="card" x-show="tab==='config'">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
      <h2 style="flex:1;margin:0;">配置</h2>
      <button class="btn-sm" @click="configTab='form'" :class="{active:configTab==='form'}">表单</button>
      <button class="btn-sm" @click="configTab='raw'" :class="{active:configTab==='raw'}">JSON</button>
      <label style="font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px;">
        <input type="checkbox" x-model="showAdvanced"> 高级
      </label>
    </div>

    <!-- 结构化表单 -->
    <div x-show="configTab==='form' && configLoading" style="text-align:center;padding:40px;color:var(--muted);font-size:.85rem;">
      加载配置中...
    </div>

    <div x-show="configTab==='form' && !configLoading">
      <!-- 分类标签 -->
      <div class="tabs" style="flex-wrap:wrap;">
        <template x-for="cat in categories" :key="cat">
          <button class="tab" :class="{active:activeCategory===cat}" @click="activeCategory=cat" x-text="cat"></button>
        </template>
      </div>

      <!-- 字段列表 -->
      <div class="scroll" style="max-height:400px;">
        <template x-for="field in visibleFields" :key="field.key">
          <div class="config-field" :class="{error: formErrors[field.key]}">
            <label class="config-label">
              <span x-text="field.label"></span>
              <span x-show="field.restart_required" class="restart-badge">需重启</span>
              <span x-show="!field.restart_required" class="no-restart-badge">热生效</span>
            </label>
            <span class="config-desc" x-text="field.description" x-show="field.description"></span>

            <!-- Boolean -->
            <template x-if="field.type==='boolean'">
              <label class="toggle">
                <input type="checkbox" x-model="formValues[field.key]"
                       @change="formDirty[field.key]=true;delete formErrors[field.key]">
                <span class="toggle-slider"></span>
              </label>
            </template>

            <!-- Number -->
            <template x-if="field.type==='number'">
              <div class="number-row">
                <input type="range" :min="field.min_value||0" :max="field.max_value||100"
                       :step="field.step||1"
                       x-model.number="formValues[field.key]"
                       @input="formDirty[field.key]=true;delete formErrors[field.key]">
                <span class="number-value" x-text="formValues[field.key]!=null?formValues[field.key]:field.default"></span>
              </div>
            </template>

            <!-- Enum -->
            <template x-if="field.type==='enum'">
              <select x-init="$nextTick(() => { $el.value = formValues[field.key] || field.default })"
                      @change="formValues[field.key]=$event.target.value;formDirty[field.key]=true;delete formErrors[field.key]"
                      class="config-select">
                <template x-for="opt in field.enum_values" :key="opt">
                  <option :value="opt" x-text="opt"></option>
                </template>
              </select>
            </template>

            <!-- Device select (动态设备列表) -->
            <template x-if="field.type==='device_select'">
              <select x-init="$nextTick(() => { $el.value = formValues[field.key] || field.default })"
                      @change="formValues[field.key]=$event.target.value;formDirty[field.key]=true;delete formErrors[field.key]"
                      class="config-select">
                <option value="">系统默认（留空）</option>
                <template x-for="dev in (audioDevices[field.device_type]||[])">
                  <option :value="dev.name"
                          x-text="dev.name + ' (' + dev.channels + 'ch)'
                                  + (dev.name==='default'||dev.name==='pulse'?' ★推荐':'')
                                  + (dev.name.includes('hw:')?' [硬件直连]':'')"></option>
                </template>
              </select>
              <span class="config-desc" style="margin-top:4px;">
                💡 <b>default</b> 或 <b>pulse</b> 最省心，自动路由到正确设备；
                <b>hw:X,Y</b> 是硬件直连，固定到某个接口
              </span>
            </template>

            <!-- Secret -->
            <template x-if="field.type==='secret'">
              <input type="password"
                     placeholder="输入新值（当前已隐藏）"
                     x-model="formValues[field.key]"
                     @input="formDirty[field.key]=true;delete formErrors[field.key]"
                     class="config-input">
            </template>

            <!-- Multiline -->
            <template x-if="field.type==='multiline'">
              <textarea class="config-area" style="min-height:80px;"
                        :placeholder="field.default"
                        x-model="formValues[field.key]"
                        @input="formDirty[field.key]=true;delete formErrors[field.key]"></textarea>
            </template>

            <!-- String -->
            <template x-if="field.type==='string'">
              <input type="text"
                     :placeholder="field.default"
                     x-model="formValues[field.key]"
                     @input="formDirty[field.key]=true;delete formErrors[field.key]"
                     class="config-input">
            </template>

            <span class="field-error" x-text="formErrors[field.key]" x-show="formErrors[field.key]"></span>
          </div>
        </template>
        <div x-show="visibleFields.length===0" style="padding:20px;text-align:center;color:var(--muted);font-size:.8rem;">
          该分类下没有可显示的字段<br><small>尝试开启"高级"选项</small>
        </div>
      </div>

      <!-- 保存栏 -->
      <div class="input-row" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
        <button @click="saveFormConfig" :disabled="saving" x-text="saving?'保存中...':'保存配置'"></button>
        <span style="font-size:.75rem;align-self:center;" x-text="configMsg"
              :class="configMsg.includes('失败')||configMsg.startsWith('✗')?'config-msg-error':'config-msg-success'"></span>
        <span style="font-size:.7rem;color:var(--muted);align-self:center;" x-show="Object.keys(formDirty).length>0"
              x-text="Object.keys(formDirty).length+' 项已修改'"></span>
      </div>
    </div>

    <!-- JSON 编辑模式 -->
    <div x-show="configTab==='raw'">
      <textarea class="config-area" x-model="configText"></textarea>
      <div class="input-row">
        <button @click="saveConfig">保存配置</button>
        <span style="font-size:.75rem;color:var(--muted);align-self:center;" x-text="configMsg"></span>
      </div>
    </div>
  </div>

</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('dashboard', () => ({
    state: {},
    events: [],
    messages: [],
    system: {},
    sys: {},
    tab: 'chat',
    configText: '',
    configMsg: '',
    audioPct: 0,
    seq: 0,
    _pollTimer: null,
    // 结构化表单
    schema: [],
    categories: [],
    activeCategory: null,
    showAdvanced: false,
    formValues: {},
    formErrors: {},
    formDirty: {},
    saving: false,
    configTab: 'form',
    configLoading: true,
    audioDevices: {input: [], output: []},

    async init() {
      await this.loadInitialState();
      this.startPolling();
      this.fetchDevices();
      await this.loadSchema();
      await this.fetchConfig();
      window.addEventListener('beforeunload', (e) => {
        if (Object.keys(this.formDirty).length > 0) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
    },

    // ---- 实时轮询 (300ms 间隔, 轮询 /api/status) ----

    async loadInitialState() {
      try {
        const data = await fetch('/api/status').then(r=>r.json());
        this.applyState(data);
        this.seq = data._seq || 0;
      } catch(e) { console.error('loadInitialState:', e); }
    },

    startPolling() {
      if (this._pollTimer) clearInterval(this._pollTimer);
      this._pollTimer = setInterval(() => this.poll(), 300);
    },

    async poll() {
      try {
        const data = await fetch('/api/status').then(r=>r.json());
        if (!data) return;
        // 状态全量刷新
        this.applyState(data);
        // 事件增量合并
        const newSeq = data._seq || 0;
        if (newSeq > (this.seq || 0)) {
          this.mergeEvents(data._events || []);
          this.seq = newSeq;
        }
      } catch(e) { /* 忽略偶发网络错误 */ }
    },

    applyState(s) {
      if (!s) return;
      this.state = s;
      this.audioPct = Math.min(1, (s.audio_rms || 0) / 0.5);
      this.applySystem(s.system);
      if (s.messages) {
        const prev = this.messages.length;
        this.messages = s.messages;
        if (this.messages.length !== prev) {
          this.$nextTick(() => {
            const el = this.$refs.chatScroll;
            if (el) el.scrollTop = el.scrollHeight;
          });
        }
      }
    },

    applySystem(sys) {
      if (!sys || !('cpu_percent' in sys)) return;  // psutil 不可用则跳过
      this.system = sys;
    },

    mergeEvents(newEvents) {
      if (!newEvents || !newEvents.length) return;
      for (const ev of newEvents.reverse()) {
        this.events.unshift(ev);
      }
      if (this.events.length > 200) this.events.length = 200;
    },

    async sendText(el) {
      const text = el.value.trim();
      if (!text) return;
      el.value = '';
      await fetch('/api/text', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({text}),
      });
    },

    async doWake() {
      await fetch('/api/wake', { method:'POST' });
    },

    fmtTime(ts) {
      const d = new Date((ts||0)*1000);
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    },

    eventDetail(e) {
      const d = e || {};
      if (d.text) return d.text.slice(0,40);
      if (d.partial_text) return d.partial_text.slice(0,40);
      if (d.confidence) return 'conf=' + d.confidence.toFixed(3);
      if (d.error) return d.error.slice(0,40);
      if (d.to) return d.from + '→' + d.to;
      return '';
    },

    async fetchDevices() {
      try {
        this.audioDevices = await fetch('/api/audio/devices').then(r=>r.json());
      } catch(e) { console.error('fetchDevices:', e); }
    },

    async fetchConfig() {
      try {
        const cfg = await fetch('/api/config').then(r=>r.json());
        this.configText = JSON.stringify(cfg || {}, null, 2);
        // 从 API 加载实际配置值
        this.formValues = this.configToFlat(cfg || {});
        // 用 schema 默认值填充 schema 中有但 config 中缺失的 key
        for (const f of this.schema) {
          if (!(f.key in this.formValues)) {
            this.formValues[f.key] = f.default;
          }
          // 脱敏字段置空，避免显示 *** 误导用户
          if (f.type === 'secret' && this.formValues[f.key] === '***') {
            this.formValues[f.key] = '';
          }
          // 设备字段保持 null → 前端显示"系统默认"
        }
      } catch(e) {
        console.error('fetchConfig:', e);
      } finally {
        this.configLoading = false;
      }
    },

    async loadSchema() {
      try {
        const [schema, cats] = await Promise.all([
          fetch('/api/config/schema').then(r=>r.json()),
          fetch('/api/config/categories').then(r=>r.json()),
        ]);
        this.schema = schema || [];
        this.categories = cats || [];
        if (this.categories.length > 0) this.activeCategory = this.categories[0];
      } catch(e) { console.error('loadSchema:', e); }
    },

    configToFlat(obj, prefix='') {
      const result = {};
      for (const [k, v] of Object.entries(obj)) {
        const path = prefix ? `${prefix}.${k}` : k;
        if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
          Object.assign(result, this.configToFlat(v, path));
        } else {
          result[path] = v;
        }
      }
      return result;
    },

    get visibleFields() {
      return this.schema.filter(f =>
        f.category === this.activeCategory &&
        (this.showAdvanced || !f.advanced)
      );
    },

    setFormValue(key, value) {
      this.formValues[key] = value;
      this.formDirty[key] = true;
      delete this.formErrors[key];
    },

    async saveFormConfig() {
      this.saving = true;
      this.configMsg = '';
      try {
        const updates = this.buildNestedUpdates();
        if (Object.keys(updates).length === 0) {
          this.configMsg = '没有变更需要保存';
          this.saving = false;
          return;
        }
        const r = await fetch('/api/config', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(updates),
        }).then(r=>r.json());
        if (r.ok) {
          const n = (r.changed_keys||[]).length;
          this.configMsg = n + ' 项已保存';
          this.formDirty = {};
          await this.fetchConfig();
        } else {
          this.configMsg = (r.error||'保存失败');
        }
      } catch(e) {
        this.configMsg = '请求失败';
      } finally {
        this.saving = false;
        if (this.configMsg.startsWith('✓') || (!isNaN(this.configMsg[0]) && this.configMsg.includes('项'))) {
          setTimeout(() => { if (this.configMsg && !this.configMsg.startsWith('✗')) this.configMsg = ''; }, 3000);
        }
      }
    },

    buildNestedUpdates() {
      const result = {};
      for (const key of Object.keys(this.formDirty)) {
        const parts = key.split('.');
        let current = result;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!current[parts[i]]) current[parts[i]] = {};
          current = current[parts[i]];
        }
        current[parts[parts.length - 1]] = this.formValues[key];
      }
      return result;
    },

    async closeWeb() {
      try {
        const r = await fetch('/api/config', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({web:{enabled:false}}),
        }).then(r=>r.json());
        this.configMsg = r.ok ? 'Web 已关闭，重启后生效' : '✗ ' + (r.error||'');
      } catch(e) {
        this.configMsg = '✗ 请求失败';
      }
    },

    async saveConfig() {
      try {
        const updates = JSON.parse(this.configText);
        const r = await fetch('/api/config', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(updates),
        }).then(r=>r.json());
        this.configMsg = r.ok ? '✓ 已保存' : '✗ ' + (r.error||'');
        if (r.ok) setTimeout(() => this.configMsg = '', 3000);
      } catch(e) {
        this.configMsg = '✗ JSON 格式错误';
      }
    },
  }));
});
</script>
</body>
</html>
