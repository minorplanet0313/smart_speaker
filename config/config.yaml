asr:
  cloud:
    aliyun:
      access_key_id: ${ALIYUN_ACCESS_KEY_ID}
      access_key_secret: ${ALIYUN_ACCESS_KEY_SECRET}
      app_key: ${ALIYUN_APP_KEY}
    baidu:
      api_key: ${BAIDU_API_KEY}
      app_id: ${BAIDU_APP_ID}
      secret_key: ${BAIDU_SECRET_KEY}
    provider: baidu
    tencent:
      region: ap-guangzhou
      secret_id: ${TENCENT_SECRET_ID}
      secret_key: ${TENCENT_SECRET_KEY}
  fallback: cloud
  incremental: true
  preprocess: true
  primary: sherpa
  sherpa:
    decoding_method: greedy_search
    model_path: ./models/sherpa-onnx-streaming-zipformer-zh-14M-2023-02-23
    num_threads: 2
  vosk:
    model_path: ./models/vosk-model-small-cn-0.22
    sample_rate: 16000
    words_list: null
audio:
  channels: 1
  chunk_size: 1024
  device:
    microphone: pulse
    speaker: pulse
  format: int16
  sample_rate: 16000
  vad:
    enabled: true
    max_speech_duration_ms: 15000
    min_silence_duration_ms: 400
    min_speech_duration_ms: 100
    speech_pad_ms: 300
    threshold: 0.3
conversation:
  context_timeout_seconds: 300
  max_history_rounds: 20
  system_prompt: '你是一个智能语音助手，名叫"小智"。你的特点是：

    1. 回答简洁明了，适合语音交互（不要太长）

    2. 语气友好、自然，像朋友聊天

    3. 说话带东北口音，性格豪爽幽默，像东北老铁

    4. 常用东北词汇：嘎哈、咋地、整一个、得劲儿、老好使了

    5. 支持中文，偶尔可以使用英文词汇

    6. 如果不确定答案，诚实地告诉用户

    7. 回答控制在 100 字以内，除非用户要求详细解释

    '
debug:
  save_audio: false
general:
  data_dir: ./data
  language: zh-CN
  log_level: INFO
  name: 小智音箱
  sample_rate: 16000
  wake_word: 小智小智
gpio:
  button:
    action_pin: 23
    enabled: true
    mute_pin: 22
  enabled: false
  led:
    enabled: true
    pin: 17
    type: rgb
llm:
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  max_tokens: 393216
  model: deepseek-v4-pro
  provider: deepseek
  retry:
    backoff_base: 2
    max_retries: 3
  stream: true
  temperature: 0.7
  timeout_seconds: 30
performance:
  audio_buffer_seconds: 0.5
  gc_threshold: 1000
  onnx_threads: 2
skills:
  auto_discover: true
  builtin_enabled:
  - chat
  - time
  - weather
  weather:
    api_key: ${WEATHER_API_KEY}
    city: auto
tts:
  edge:
    pitch: +0Hz
    proxy: null
    rate: +0%
    voice: zh-CN-liaoning-XiaobeiNeural
  fallback: piper
  piper:
    config_path: null
    model_path: ./models/piper-voices/zh_CN-huayan-medium.onnx
  primary: edge
wake_word:
  cooldown_ms: 2000
  enabled: true
  engine: openwakeword
  inference_framework: onnx
  model_path: ./models/openwakeword/xiao_zhi.onnx
  threshold: 0.7
  # Porcupine 设置 (engine: porcupine 时生效)
  # 免费获取 access_key: https://console.picovoice.ai/
  porcupine_access_key: ${PORCUPINE_ACCESS_KEY}
  porcupine_keyword: porcupine
  porcupine_keyword_path: ""
  porcupine_model_path: ""
web:
  enabled: true
  host: 0.0.0.0
  port: 8080
